<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexPlanet Task 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🧠 Interactive Quiz</h1>
    <p class="subtitle">ApexPlanet Task-3 Project</p>

    <div class="quiz-box">
        <h2 id="question"></h2>

        <div id="options"></div>

        <button id="nextBtn">Next Question</button>

        <div id="result"></div>

        <button id="restartBtn" style="display:none;">
            Play Again
        </button>
    </div>

    <div class="joke-box">
        <h2>😂 Random Joke</h2>

        <button id="jokeBtn">Get Joke</button>

        <p id="joke"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
